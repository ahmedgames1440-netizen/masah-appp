<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>مَسْح | Masah — مسح النصوص وترجمتها</title>

<!-- Tesseract.js للتعرف الضوئي على النصوص (يعمل بالكامل داخل المتصفح) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<!-- jsPDF لتصدير PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- SheetJS لتصدير Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- docx لتصدير Word -->
<!-- docx.js: تحميل أساسي + احتياطي تلقائي. إذا فشل المصدر الأول لأي سبب (حظر شبكة، خلل سيرفر)، يُحمَّل بديل عند الحاجة -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js" onerror="window.__docxLoadFailed=true"></script>

<style>
  :root{
    --ink-900:#0F1B2D;
    --ink-800:#16263d;
    --ink-700:#1f3550;
    --gold-500:#D4A574;
    --gold-400:#e3bf95;
    --cream-50:#F7F4EE;
    --cream-200:#e9e3d6;
    --line:rgba(247,244,238,0.12);
    --good:#7FB88A;
    --warn:#E0A458;
    --font-ar-display: 'Markazi Text','Tajawal',serif;
    --font-ar-body: 'Tajawal','Segoe UI',sans-serif;
    --font-en: 'IBM Plex Mono', monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Markazi+Text:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:var(--ink-900);
    color:var(--cream-50);
    font-family:var(--font-ar-body);
    min-height:100vh;
    overflow-x:hidden;
  }
  body{
    background-image:
      radial-gradient(circle at 15% 0%, rgba(212,165,116,0.10), transparent 45%),
      radial-gradient(circle at 90% 80%, rgba(127,184,138,0.06), transparent 40%);
  }
  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* ===== Header ===== */
  header{
    padding:22px 20px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid var(--line);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand-mark{
    width:34px;height:34px;
    border-radius:9px;
    background:linear-gradient(135deg,var(--gold-500),var(--gold-400));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 14px rgba(212,165,116,0.35);
    flex-shrink:0;
  }
  .brand-mark svg{width:18px;height:18px;}
  .brand-name{
    font-family:var(--font-ar-display);
    font-weight:700;
    font-size:22px;
    letter-spacing:0.3px;
    color:var(--cream-50);
  }
  .brand-sub{
    font-family:var(--font-en);
    font-size:10px;
    color:var(--gold-400);
    letter-spacing:2px;
    text-transform:uppercase;
    margin-top:-2px;
  }
  .lang-toggle{
    display:flex;
    background:var(--ink-700);
    border-radius:20px;
    padding:3px;
    gap:2px;
    border:1px solid var(--line);
  }
  .lang-toggle button{
    border:none;
    background:transparent;
    color:var(--cream-200);
    font-family:var(--font-en);
    font-size:11px;
    padding:6px 12px;
    border-radius:16px;
    cursor:pointer;
    transition:.25s;
  }
  .lang-toggle button.active{
    background:var(--gold-500);
    color:var(--ink-900);
    font-weight:600;
  }

  /* ===== Main scroll area ===== */
  main{
    flex:1;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  /* ===== Scan Stage ===== */
  .stage{
    position:relative;
    border-radius:20px;
    background:var(--ink-800);
    border:1px solid var(--line);
    min-height:300px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .stage.has-image{ min-height:340px; }
  .stage img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
  }
  .stage-empty{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    padding:40px 24px;
    text-align:center;
  }
  .stage-empty .ring{
    width:74px;height:74px;
    border-radius:50%;
    border:1.5px dashed var(--gold-500);
    display:flex;align-items:center;justify-content:center;
    opacity:0.85;
  }
  .stage-empty .ring svg{ width:30px;height:30px; }
  .stage-empty p{
    font-size:14.5px;
    color:var(--cream-200);
    line-height:1.7;
    max-width:260px;
  }
  .stage-empty .hint{
    font-family:var(--font-en);
    font-size:10.5px;
    letter-spacing:1px;
    color:rgba(247,244,238,0.4);
    text-transform:uppercase;
  }

  /* scan-line animation overlay */
  .scan-overlay{
    position:absolute; inset:0;
    display:none;
    background:rgba(15,27,45,0.25);
  }
  .scan-overlay.active{ display:block; }
  .scan-line{
    position:absolute;
    left:0; right:0;
    height:2px;
    background:linear-gradient(90deg, transparent, var(--gold-400), transparent);
    box-shadow:0 0 18px 2px rgba(212,165,116,0.7);
    animation:sweep 1.8s ease-in-out infinite;
  }
  @keyframes sweep{
    0%{ top:6%; opacity:0; }
    10%{ opacity:1; }
    50%{ top:92%; opacity:1; }
    90%{ opacity:1; }
    100%{ top:6%; opacity:0; }
  }
  .scan-status{
    position:absolute;
    bottom:14px; left:0; right:0;
    text-align:center;
    font-family:var(--font-en);
    font-size:11px;
    letter-spacing:1.5px;
    color:var(--gold-400);
    text-transform:uppercase;
  }

  /* ===== Action row ===== */
  .actions-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .btn{
    border:none;
    border-radius:14px;
    padding:14px 16px;
    font-family:var(--font-ar-body);
    font-weight:700;
    font-size:14.5px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:transform .15s, opacity .2s;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{
    background:var(--gold-500);
    color:var(--ink-900);
  }
  .btn-outline{
    background:transparent;
    border:1.4px solid var(--line);
    color:var(--cream-50);
  }
  .btn-outline:hover{ border-color:var(--gold-500); }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .btn svg{ width:17px;height:17px; flex-shrink:0; }

  input[type=file]{ display:none; }

  /* ===== Result card ===== */
  .card{
    background:var(--ink-800);
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px;
    display:none;
  }
  .card.show{ display:block; animation:rise .35s ease; }
  @keyframes rise{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .card-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
  }
  .card-title{
    font-family:var(--font-en);
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--gold-400);
    display:flex;
    align-items:center;
    gap:7px;
  }
  .card-title .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--good);
  }
  .copy-btn{
    background:transparent;
    border:none;
    color:var(--cream-200);
    font-size:11px;
    font-family:var(--font-en);
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:5px;
    padding:4px 8px;
    border-radius:8px;
  }
  .copy-btn:hover{ background:var(--ink-700); color:var(--gold-400); }

  .result-text{
    width:100%;
    min-height:120px;
    background:var(--ink-900);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px;
    color:var(--cream-50);
    font-size:15px;
    line-height:1.9;
    font-family:var(--font-ar-body);
    resize:vertical;
  }
  .result-text:focus{ outline:none; border-color:var(--gold-500); }

  /* translate bar */
  .translate-bar{
    display:none;
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid var(--line);
  }
  .translate-bar.show{ display:block; }
  .tr-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
  }
  .tr-select{
    flex:1;
    background:var(--ink-900);
    border:1px solid var(--line);
    color:var(--cream-50);
    border-radius:10px;
    padding:9px 10px;
    font-family:var(--font-ar-body);
    font-size:13px;
  }
  .tr-swap{
    background:var(--ink-700);
    border:none;
    width:34px;height:34px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    color:var(--gold-400);
    flex-shrink:0;
  }
  .tr-swap svg{ width:16px;height:16px; }
  .tr-swap.spin{ animation:spin360 .4s ease; }
  @keyframes spin360{ to{ transform:rotate(180deg); } }

  .translate-output{
    background:var(--ink-900);
    border:1px dashed var(--line);
    border-radius:12px;
    padding:14px;
    font-size:15px;
    line-height:1.9;
    color:var(--cream-200);
    min-height:60px;
  }
  .translate-output.empty{
    color:rgba(247,244,238,0.35);
    font-family:var(--font-en);
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-transform:uppercase;
    letter-spacing:1px;
  }

  /* ===== Export bar ===== */
  .export-card{
    display:none;
  }
  .export-card.show{ display:block; }
  .export-label{
    font-family:var(--font-en);
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:rgba(247,244,238,0.45);
    margin-bottom:10px;
  }
  .export-row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
  }
  .export-btn{
    background:var(--ink-800);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:7px;
    cursor:pointer;
    color:var(--cream-50);
    font-size:12px;
    font-weight:700;
    transition:.2s;
  }
  .export-btn:hover{ border-color:var(--gold-500); transform:translateY(-2px); }
  .export-btn svg{ width:22px;height:22px; }
  .export-btn.word svg{ color:#5B9BD5; }
  .export-btn.pdf svg{ color:#E0716B; }
  .export-btn.excel svg{ color:var(--good); }

  footer{
    padding:16px 20px 28px;
    text-align:center;
    font-family:var(--font-en);
    font-size:10px;
    letter-spacing:1.5px;
    color:rgba(247,244,238,0.3);
    text-transform:uppercase;
  }

  /* toast */
  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--cream-50);
    color:var(--ink-900);
    padding:12px 22px;
    border-radius:30px;
    font-size:13.5px;
    font-weight:700;
    opacity:0;
    transition:.3s;
    pointer-events:none;
    z-index:50;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    white-space:nowrap;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  ::-webkit-scrollbar{ width:0; }
</style>
</head>
<body>

<div class="app">

  <header>
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0F1B2D" stroke-width="2.2" stroke-linecap="round"><path d="M4 7V4h3M20 7V4h-3M4 17v3h3M20 17v3h-3"/><path d="M4 12h16" stroke-dasharray="2 2"/></svg>
      </div>
      <div>
        <div class="brand-name">مَسْح</div>
        <div class="brand-sub">scan · translate · export</div>
      </div>
    </div>
    <div class="lang-toggle">
      <button class="active" id="ui-ar">ع</button>
      <button id="ui-en">EN</button>
    </div>
  </header>

  <main>

    <!-- Scan Stage -->
    <div class="stage" id="stage">
      <div class="stage-empty" id="stageEmpty">
        <div class="ring">
          <svg viewBox="0 0 24 24" fill="none" stroke="#D4A574" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 16v3a1 1 0 001 1h3M20 16v3a1 1 0 01-1 1h-3M4 8V5a1 1 0 011-1h3M20 8V5a1 1 0 00-1-1h-3"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <p id="emptyText">صوّر الورقة أو اختر صورة من معرضك، وسيتم استخراج النص فوراً</p>
        <span class="hint">JPG · PNG — عربي / إنجليزي</span>
      </div>
      <img id="previewImg" style="display:none;">
      <div class="scan-overlay" id="scanOverlay">
        <div class="scan-line"></div>
        <div class="scan-status" id="scanStatus">جارٍ تحليل النص… 0%</div>
      </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" capture="environment">
    <input type="file" id="galleryInput" accept="image/*">

    <div class="actions-row">
      <button class="btn btn-primary" id="btnCamera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span id="lblCamera">مسح بالكاميرا</span>
      </button>
      <button class="btn btn-outline" id="btnGallery">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span id="lblGallery">من المعرض</span>
      </button>
    </div>

    <!-- Result -->
    <div class="card" id="resultCard">
      <div class="card-head">
        <div class="card-title"><span class="dot"></span><span id="lblExtracted">النص المستخرج</span></div>
        <button class="copy-btn" id="copyBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          <span id="lblCopy">نسخ</span>
        </button>
      </div>
      <textarea class="result-text" id="resultText" placeholder="…"></textarea>

      <div class="translate-bar" id="translateBar">
        <div class="tr-row">
          <select class="tr-select" id="fromLang">
            <option value="ar">العربية</option>
            <option value="en">English</option>
          </select>
          <button class="tr-swap" id="swapBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M7 10L3 6l4-4M3 6h13a4 4 0 014 4v1M17 14l4 4-4 4M21 18H8a4 4 0 01-4-4v-1"/></svg>
          </button>
          <select class="tr-select" id="toLang">
            <option value="en">English</option>
            <option value="ar">العربية</option>
          </select>
        </div>
        <button class="btn btn-primary" id="translateBtn" style="width:100%; margin-bottom:10px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8l6 6M4 14l6-6 2-3M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/></svg>
          <span id="lblTranslate">ترجم</span>
        </button>
        <div class="translate-output empty" id="translateOutput" data-empty-text="ستظهر الترجمة هنا">ستظهر الترجمة هنا</div>
      </div>
    </div>

    <!-- Export -->
    <div class="card export-card" id="exportCard">
      <div class="export-label" id="lblExport">تصدير الملف</div>
      <div class="export-row">
        <div class="export-btn word" id="exportWord">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M9 13l1.5 5L12 14l1.5 4L15 13"/></svg>
          Word
        </div>
        <div class="export-btn pdf" id="exportPdf">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M9 17v-5h1.5a1.5 1.5 0 010 3H9M13.5 17v-5H15M13.5 14.5H15"/></svg>
          PDF
        </div>
        <div class="export-btn excel" id="exportExcel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M9 13l5 4M14 13l-5 4"/></svg>
          Excel
        </div>
      </div>
    </div>

  </main>

  <footer>Demo build · Tesseract OCR engine</footer>
</div>

<div class="toast" id="toast"></div>

<script>
const dict = {
  ar:{
    emptyText:"صوّر الورقة أو اختر صورة من معرضك، وسيتم استخراج النص فوراً",
    camera:"مسح بالكاميرا", gallery:"من المعرض",
    extracted:"النص المستخرج", copy:"نسخ", copied:"تم النسخ ✓",
    translate:"ترجم", translating:"جارٍ الترجمة…",
    exportLabel:"تصدير الملف",
    scanning:(p)=>`جارٍ تحليل النص… ${p}%`,
    noText:"لم يتم العثور على نص واضح، حاول بصورة أوضح",
    exported:(t)=>`تم تصدير ملف ${t} بنجاح`,
    emptyTranslate:"ستظهر الترجمة هنا"
  },
  en:{
    emptyText:"Scan a document or pick a photo — text is extracted instantly",
    camera:"Scan with Camera", gallery:"From Gallery",
    extracted:"Extracted Text", copy:"Copy", copied:"Copied ✓",
    translate:"Translate", translating:"Translating…",
    exportLabel:"Export File",
    scanning:(p)=>`Analyzing text… ${p}%`,
    noText:"No clear text found, try a clearer photo",
    exported:(t)=>`${t} file exported successfully`,
    emptyTranslate:"Translation will appear here"
  }
};
let uiLang = 'ar';

// فحص أولي: تأكد إن مكتبة Tesseract تحمّلت بنجاح من الإنترنت
window.addEventListener('load', ()=>{
  if(typeof Tesseract === 'undefined'){
    showToast('⚠ فشل تحميل محرك القراءة — تحقق من اتصال الإنترنت وأعد تحميل الصفحة');
    document.getElementById('btnCamera').disabled = true;
    document.getElementById('btnGallery').disabled = true;
  }
});

function setUiLang(lang){
  uiLang = lang;
  document.getElementById('ui-ar').classList.toggle('active', lang==='ar');
  document.getElementById('ui-en').classList.toggle('active', lang==='en');
  document.body.dir = 'rtl'; // keep app shell RTL-friendly either way, content stays readable
  const d = dict[lang];
  document.getElementById('emptyText').textContent = d.emptyText;
  document.getElementById('lblCamera').textContent = d.camera;
  document.getElementById('lblGallery').textContent = d.gallery;
  document.getElementById('lblExtracted').textContent = d.extracted;
  document.getElementById('lblCopy').textContent = d.copy;
  document.getElementById('lblTranslate').textContent = d.translate;
  document.getElementById('lblExport').textContent = d.exportLabel;
  const out = document.getElementById('translateOutput');
  if(out.classList.contains('empty')) out.textContent = d.emptyTranslate;
}
document.getElementById('ui-ar').onclick = ()=>setUiLang('ar');
document.getElementById('ui-en').onclick = ()=>setUiLang('en');

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

const fileInput = document.getElementById('fileInput');
const galleryInput = document.getElementById('galleryInput');
document.getElementById('btnCamera').onclick = ()=>fileInput.click();
document.getElementById('btnGallery').onclick = ()=>galleryInput.click();
fileInput.onchange = (e)=>handleImage(e.target.files[0]);
galleryInput.onchange = (e)=>handleImage(e.target.files[0]);

const stage = document.getElementById('stage');
const stageEmpty = document.getElementById('stageEmpty');
const previewImg = document.getElementById('previewImg');
const scanOverlay = document.getElementById('scanOverlay');
const scanStatus = document.getElementById('scanStatus');
const resultCard = document.getElementById('resultCard');
const resultText = document.getElementById('resultText');
const translateBar = document.getElementById('translateBar');
const exportCard = document.getElementById('exportCard');

// تحسين الصورة قبل التعرف: تكبير + تحويل لتدرج رمادي + رفع التباين
// صور الكاميرا (بخلاف الاسكانر) عادة فيها إضاءة غير منتظمة وحجم كبير غير مُحسّن، فهذا يرفع الدقة كثيراً
function preprocessImage(file){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=>{
      try{
        const targetWidth = 1600; // تكبير الصور الصغيرة وتصغير الكبيرة جداً لحجم متوسط مثالي للـOCR
        const scale = targetWidth / img.width;
        const canvas = document.createElement('canvas');
        canvas.width = targetWidth;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
        const d = imgData.data;
        for(let i=0;i<d.length;i+=4){
          // تدرج رمادي
          const gray = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
          // رفع تباين بسيط (threshold ناعم) يساعد النص يبرز عن الخلفية
          const contrasted = Math.min(255, Math.max(0, (gray - 128) * 1.5 + 128));
          d[i] = d[i+1] = d[i+2] = contrasted;
        }
        ctx.putImageData(imgData, 0, 0);
        canvas.toBlob((blob)=> resolve(blob), 'image/png');
      }catch(e){ reject(e); }
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

async function handleImage(file){
  if(!file) return;
  const url = URL.createObjectURL(file);
  stageEmpty.style.display = 'none';
  previewImg.src = url;
  previewImg.style.display = 'block';
  stage.classList.add('has-image');
  scanOverlay.classList.add('active');
  resultCard.classList.remove('show');
  translateBar.classList.remove('show');
  exportCard.classList.remove('show');
  scanStatus.textContent = uiLang==='ar' ? 'جارٍ تحميل محرك القراءة…' : 'Loading OCR engine…';

  try{
    scanStatus.textContent = uiLang==='ar' ? 'جارٍ تحسين الصورة…' : 'Enhancing image…';
    const processedBlob = await preprocessImage(file).catch(()=>file); // إذا فشل التحسين، استخدم الصورة الأصلية كحل احتياطي

    const result = await Tesseract.recognize(processedBlob, 'ara+eng', {
      logger: (m)=>{
        console.log(m);
        if(m.status === 'loading tesseract core' || m.status === 'initializing tesseract'){
          scanStatus.textContent = uiLang==='ar' ? 'جارٍ تهيئة المحرك…' : 'Initializing engine…';
        } else if(m.status === 'loading language traineddata'){
          const pct = Math.round((m.progress||0)*100);
          scanStatus.textContent = uiLang==='ar' ? `تحميل بيانات اللغة… ${pct}%` : `Loading language data… ${pct}%`;
        } else if(m.status === 'recognizing text'){
          const pct = Math.round(m.progress*100);
          scanStatus.textContent = dict[uiLang].scanning(pct);
        }
      }
    });
    scanOverlay.classList.remove('active');
    const text = result.data.text.trim();

    if(!text){
      resultText.value = '';
      showToast(uiLang==='ar'
        ? '⚠ لم يُستخرج نص. جرّب: إضاءة أقوى، تقريب الكاميرا، أو تثبيت الورقة بدون ميل'
        : '⚠ No text found. Try: better lighting, closer shot, or a flatter angle');
      resultText.placeholder = dict[uiLang].noText;
      resultCard.classList.add('show');
      return;
    }

    resultText.value = text;
    resultCard.classList.add('show');
    translateBar.classList.add('show');
    exportCard.classList.add('show');
    detectAndSetLang(text);
  }catch(err){
    scanOverlay.classList.remove('active');
    console.error(err);
    showToast((uiLang==='ar' ? 'خطأ في القراءة: ' : 'OCR error: ') + (err.message || err));
    resultCard.classList.add('show');
    resultText.value = '';
    resultText.placeholder = uiLang==='ar'
      ? 'حدث خطأ تقني. تأكد من اتصال الإنترنت (المحرك يحمّل بيانات اللغة أول مرة) وحاول مجدداً.'
      : 'A technical error occurred. Make sure you have internet (the engine downloads language data the first time) and try again.';
  }
}

function detectAndSetLang(text){
  const arabicChars = (text.match(/[\u0600-\u06FF]/g)||[]).length;
  const isArabic = arabicChars > text.length * 0.15;
  document.getElementById('fromLang').value = isArabic ? 'ar' : 'en';
  document.getElementById('toLang').value = isArabic ? 'en' : 'ar';
}

document.getElementById('copyBtn').onclick = ()=>{
  navigator.clipboard.writeText(resultText.value);
  showToast(dict[uiLang].copied);
};

document.getElementById('swapBtn').onclick = (e)=>{
  const f = document.getElementById('fromLang');
  const t = document.getElementById('toLang');
  [f.value, t.value] = [t.value, f.value];
  e.currentTarget.classList.add('spin');
  setTimeout(()=>e.currentTarget.classList.remove('spin'), 400);
};

document.getElementById('translateBtn').onclick = async ()=>{
  const text = resultText.value.trim();
  if(!text) return;
  const from = document.getElementById('fromLang').value;
  const to = document.getElementById('toLang').value;
  const out = document.getElementById('translateOutput');
  out.classList.remove('empty');
  out.textContent = dict[uiLang].translating;
  try{
    // مصدر ترجمة تجريبي مجاني لإثبات الفكرة (Google translate unofficial endpoint)
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    const data = await res.json();
    const translated = data[0].map(seg=>seg[0]).join('');
    out.textContent = translated;
  }catch(err){
    out.textContent = '⚠ ' + (uiLang==='ar' ? 'تعذرت الترجمة في هذه النسخة التجريبية (قيود الشبكة/المتصفح). في النسخة النهائية ستُستخدم خدمة ترجمة رسمية مدفوعة الاستخدام (Google Cloud Translation API) دون هذه القيود.' : 'Translation failed in this demo (network/browser restriction). The final app would use an official paid Translation API without this limitation.');
  }
};

// ===== Export functions =====
// تحميل احتياطي ديناميكي لمكتبة docx — يحاول مصادر متعددة بالتسلسل
// يُستخدم فقط إذا فشل التحميل الأساسي بأعلى الصفحة (شبكة، حظر CDN، إلخ)
function loadScriptOnce(url){
  return new Promise((resolve, reject)=>{
    const s = document.createElement('script');
    s.src = url;
    s.onload = ()=> resolve();
    s.onerror = ()=> reject(new Error('فشل تحميل: ' + url));
    document.head.appendChild(s);
  });
}

async function ensureDocxLoaded(){
  if(typeof window.docx !== 'undefined') return true; // محمّلة بالفعل، لا حاجة لأي شيء

  const fallbackSources = [
    'https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.js',
    'https://unpkg.com/docx@8.5.0/build/index.js',
    'https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js'
  ];

  for(const src of fallbackSources){
    try{
      await loadScriptOnce(src);
      if(typeof window.docx !== 'undefined') return true;
    }catch(e){
      console.warn('docx fallback failed:', src, e);
    }
  }
  return false;
}

document.getElementById('exportWord').onclick = async ()=>{
  try{
    showToast(uiLang==='ar' ? 'جارٍ تجهيز Word…' : 'Preparing Word…');
    const ready = await ensureDocxLoaded();
    if(!ready){
      showToast(uiLang==='ar'
        ? '⚠ تعذّر تحميل مكوّن Word. تأكد من اتصال الإنترنت وحاول مجدداً'
        : '⚠ Could not load Word component. Check your internet connection and try again');
      return;
    }

    const { Document, Packer, Paragraph, TextRun, AlignmentType } = docx;
    const text = resultText.value;
    const lines = text.split('\n');

    const paragraphs = lines.map(line => {
      const safeLine = line.length > 0 ? line : ' ';
      return new Paragraph({
        alignment: AlignmentType.RIGHT,
        bidirectional: true,
        children: [ new TextRun({ text: safeLine, font: "Arial", size: 24 }) ]
      });
    });

    const doc = new Document({
      sections: [{ properties: {}, children: paragraphs }]
    });

    const blob = await Packer.toBlob(doc);
    downloadBlob(blob, 'masah-export.docx');
    showToast(dict[uiLang].exported('Word'));
  }catch(err){
    console.error('Word export error:', err);
    showToast((uiLang==='ar' ? 'خطأ بتصدير Word: ' : 'Word export error: ') + (err.message || err));
  }
};

document.getElementById('exportPdf').onclick = ()=>{
  const { jsPDF } = window.jspdf;
  const text = resultText.value;

  // فحص: هل النص يحتوي على حروف عربية؟
  const hasArabic = /[\u0600-\u06FF]/.test(text);

  if(!hasArabic){
    // نص إنجليزي بحت: المسار العادي السريع لـ jsPDF يعمل بدون مشاكل
    const pdf = new jsPDF();
    pdf.setFont('helvetica');
    pdf.setFontSize(12);
    const lines = pdf.splitTextToSize(text, 180);
    pdf.text(lines, 15, 20);
    pdf.save('masah-export.pdf');
    showToast(dict[uiLang].exported('PDF'));
    return;
  }

  // نص يحتوي على عربي: نرسمه على Canvas (المتصفح يعرض العربي بشكل صحيح هناك)
  // ثم نحوّل الـ Canvas لصورة ونضمّنها داخل صفحات PDF — هذا يتجاوز مشكلة عدم دعم jsPDF للخطوط العربية تماماً
  showToast(uiLang==='ar' ? 'جارٍ تجهيز PDF…' : 'Preparing PDF…');

  const pageWidthPx = 1240;   // يعادل تقريباً عرض A4 بدقة طباعة جيدة
  const pageHeightPx = 1754;  // يعادل تقريباً ارتفاع A4
  const marginPx = 80;
  const fontSizePx = 32;
  const lineHeightPx = 52;

  const measureCanvas = document.createElement('canvas');
  const measureCtx = measureCanvas.getContext('2d');
  measureCtx.font = `${fontSizePx}px Tajawal, Arial, sans-serif`;

  const maxLineWidth = pageWidthPx - marginPx*2;
  const rawLines = text.split('\n');
  const wrappedLines = [];

  // تقسيم كل سطر طويل لأسطر تتسع داخل عرض الصفحة (word-wrap يدوي يدعم العربي)
  rawLines.forEach(rawLine=>{
    if(rawLine.trim() === ''){ wrappedLines.push(''); return; }
    const words = rawLine.split(' ');
    let current = '';
    words.forEach(word=>{
      const test = current ? current + ' ' + word : word;
      if(measureCtx.measureText(test).width > maxLineWidth && current){
        wrappedLines.push(current);
        current = word;
      } else {
        current = test;
      }
    });
    if(current) wrappedLines.push(current);
  });

  const linesPerPage = Math.floor((pageHeightPx - marginPx*2) / lineHeightPx);
  const pdf = new jsPDF({ unit:'px', format:[pageWidthPx, pageHeightPx] });
  let pageIndex = 0;

  for(let i=0; i<wrappedLines.length; i+=linesPerPage){
    const pageLines = wrappedLines.slice(i, i+linesPerPage);
    const canvas = document.createElement('canvas');
    canvas.width = pageWidthPx;
    canvas.height = pageHeightPx;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#000000';
    ctx.font = `${fontSizePx}px Tajawal, Arial, sans-serif`;
    ctx.direction = 'rtl';
    ctx.textAlign = 'right';

    pageLines.forEach((line, idx)=>{
      const y = marginPx + (idx+1)*lineHeightPx;
      ctx.fillText(line, pageWidthPx - marginPx, y, maxLineWidth);
    });

    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    if(pageIndex > 0) pdf.addPage([pageWidthPx, pageHeightPx]);
    pdf.addImage(imgData, 'JPEG', 0, 0, pageWidthPx, pageHeightPx);
    pageIndex++;
  }

  pdf.save('masah-export.pdf');
  showToast(dict[uiLang].exported('PDF'));
};

document.getElementById('exportExcel').onclick = ()=>{
  const text = resultText.value;
  const rows = text.split('\n').map(line=>{
    // فصل الأعمدة تلقائياً عند وجود مسافات متعددة أو فواصل (مفيد للأرقام/الجداول)
    return line.split(/\s{2,}|\t|,(?=\s*\d)/).filter(c=>c.trim()!=='');
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, 'masah-export.xlsx');
  showToast(dict[uiLang].exported('Excel'));
};

function downloadBlob(blob, filename){
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
